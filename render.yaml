databases:
  - name: family-health-postgres
    databaseName: family_health
    user: family_health_user

services:
  - type: web
    name: family-health-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start:backend
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: family-health-postgres
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-mini
